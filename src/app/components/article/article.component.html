<article class="articles-container">
  <div class="articles-header">
    <h2>Latest Articles</h2>
    <p>Discover the latest insights and tutorials</p>
  </div>

  <div class="articles-grid">
    <div *ngFor="let article of articles" class="article-card">
      <div class="article-image">
        <img [src]="article.image" [alt]="article.title" loading="lazy">
        <span class="category-badge">{{ article.category }}</span>
      </div>

      <div class="article-content">
        <h3>{{ article.title }}</h3>

        <div class="article-meta">
          <span class="author"><i class="fas fa-user"></i> {{ article.author }}</span>
          <span class="date"><i class="fas fa-calendar"></i> {{ article.date | date: 'MMM dd, yyyy' }}</span>
        </div>

        <p class="excerpt">{{ article.excerpt }}</p>

        <button class="read-more">
          Read More <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="pagination">
    <button class="page-btn">Previous</button>
    <button class="page-btn active">1</button>
    <button class="page-btn">2</button>
    <button class="page-btn">3</button>
    <button class="page-btn">Next</button>
  </div>
</article>
